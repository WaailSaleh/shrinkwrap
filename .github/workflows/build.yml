name: Build ZenithVault

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            build-essential \
            nsis

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: wails build -platform linux/amd64 -tags webkit2_41 -o zenithvault-linux-amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenithvault-linux-amd64
          path: build/bin/zenithvault-linux-amd64

  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows amd64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Download Go modules
        run: go mod download

      - name: Build
        run: wails build -platform windows/amd64 -nsis -o zenithvault-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenithvault-windows-amd64
          path: |
            build/bin/zenithvault-windows-amd64.exe
            build/bin/*.nsis.exe

  # ── macOS (Intel + Apple Silicon universal) ────────────────────────────────
  build-macos:
    name: Build (macOS universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Download Go modules
        run: go mod download

      - name: Build (universal binary)
        run: wails build -platform darwin/universal -o ZenithVault.app

      - name: Zip .app bundle
        run: |
          cd build/bin
          zip -r ZenithVault-macos-universal.zip ZenithVault.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zenithvault-macos-universal
          path: build/bin/ZenithVault-macos-universal.zip

  # ── Release (on tag push) ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/zenithvault-linux-amd64/zenithvault-linux-amd64
            artifacts/zenithvault-windows-amd64/zenithvault-windows-amd64.exe
            artifacts/zenithvault-macos-universal/ZenithVault-macos-universal.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
